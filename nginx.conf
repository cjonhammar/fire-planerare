server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Live quote proxy → Yahoo Finance (avoids browser CORS).
    # Frontend calls /api/yf/v8/finance/chart/<symbol>?...
    location /api/yf/ {
        resolver 127.0.0.11 1.1.1.1 8.8.8.8 ipv6=off valid=30s;
        resolver_timeout 5s;

        set $yahoo query1.finance.yahoo.com;
        rewrite ^/api/yf/(.*)$ /$1 break;
        proxy_pass https://$yahoo;

        proxy_http_version 1.1;
        proxy_set_header Host query1.finance.yahoo.com;
        proxy_set_header User-Agent "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36";
        proxy_set_header Accept "application/json";
        proxy_ssl_server_name on;

        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location / {
        try_files $uri /index.html;
    }

    location ~* \.(js|css|svg|png|jpg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
